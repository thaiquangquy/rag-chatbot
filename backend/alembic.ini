[alembic]
# Path to the Alembic migration scripts directory (relative to this file)
script_location = alembic
# Optional: make project src importable for env.py
prepend_sys_path = ../
timezone = UTC

# If your env.py configures the DB URL from settings, you can leave this empty.
# Otherwise, set your DSN here (or via environment interpolation).
; sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:5432/rag

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S