openapi: 3.0.3
info:
  title: RAG Chatbot Wiki API
  version: 0.1.0
paths:
  /ingest:
    post:
      summary: Ingest a Google Doc into the knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [document_id, source]
              properties:
                document_id:
                  type: string
                  description: Google Drive document ID
                source:
                  type: string
                  description: URL or descriptor
      responses:
        "202":
          description: Ingestion accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    description: Background ingestion task id
  /chat:
    post:
      summary: Ask a question to the chatbot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query, session_id]
              properties:
                query:
                  type: string
                session_id:
                  type: string
                top_k:
                  type: integer
                  default: 5
      responses:
        "200":
          description: Chat response
          content:
            application/json:
              schema:
                type: object
                properties:
                  response_id:
                    type: string
                  generated_text:
                    type: string
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        document_id:
                          type: string
                        section_id:
                          type: string
                        url:
                          type: string
                        snippet:
                          type: string
security:
  - apiKey: []
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
